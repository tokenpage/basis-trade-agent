# config.demo.example.yaml — small-capital, fast-reacting settings for recording a demo.
# Copy to config.yaml (or point --config at it directly) once your wallet is funded.
# All values are still real trading parameters against real GMX V2 — nothing here is simulated.
chain: arbitrum
targetAssetSymbol: WBTC
startingCapitalUsdc: 5.0            # match whatever USDC you actually send the wallet
minNetYieldAprPercent: 0.01         # near-zero so enterNetYieldAprPercent sits at/below current live rates
hysteresisBandAprPercent: 0.02      # small band keeps enter/exit close together for a fast demo
netRateSmoothingWindowHours: 0.02   # ~1 minute; converges to the instantaneous rate almost immediately
minimumHoldHours: 0                 # no floor — only relevant if you also demo a CLOSE in the same recording
riskTolerance: conservative          # two visible legs (spot buy + short open) reads better on camera than one atomic tx
pollIntervalSeconds: 15              # check the live rate every 15s instead of 300s
slippagePercent: 1.0                 # a bit more headroom than the production default, since $5 has more relative price impact
liquidationBufferPercent: 15.0
orderFillTimeoutSeconds: 120
minEthReserve: 0.005                 # Arbitrum gas is cheap; lower this if you're only sending a small ETH top-up
