<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basis Trade Agent · Activity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="activity-page">
    <div class="activity-shell-simple">
      <header class="activity-header-simple">
        <div>
          <p class="activity-kicker">Live execution feed</p>
          <h1>Agent #1 thoughts</h1>
          <p class="activity-subtitle">What the strategy is seeing, deciding, and doing right now.</p>
        </div>
        <div class="activity-controls">
          <button class="button-lite" id="refresh-button" type="button">Refresh now</button>
          <button class="button-lite" id="scroll-button" type="button">Scroll to latest</button>
        </div>
      </header>

      <div class="activity-meta-row">
        <span class="activity-status" id="feed-status">Waiting</span>
        <span class="activity-meta" id="last-updated">—</span>
      </div>

      <section class="terminal-feed-card">
        <div class="terminal-feed" id="terminal-feed">
          <div class="empty-state">Waiting for the strategy loop to write activity.</div>
        </div>
      </section>
    </div>
    <script src="./activity-viewer.js"></script>
  </body>
</html>
